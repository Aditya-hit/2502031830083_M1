        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 4px;
            font-weight: bold;
        }

        button:hover {
            background: #f0f0f0;
        }

        .faq-item {
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .faq-question {
            background: #f7f7f7;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
        }

        .faq-answer {
            padding: 15px;
            display: none; /* Hidden by default */
            background: #fff;
            border-top: 1px solid #ddd;
            line-height: 1.5;
        }

    </style>

<body>

    <!-- <div id="myBox"></div> -->
<div class="controls">
        <button id="btnHide">Hide All</button>
        <button id="btnShow">Show All</button>
        <button id="btnToggle">Toggle All</button>
        <button id="btnFadeOut">Fade Out All</button>
        <button id="btnFadeIn">Fade In All</button>
    </div>

    
    <!-- <div class="btn-container">

    <script>
        $(document).ready(function(){
            
        // 1. Instant Hide
            $("#btnhide").click(function() {
                $(".faq-answer").hide();
            });

            // 2. Instant Show
            $("#btnshow").click(function() {
                $(".faq-answer").show();
            });

            // 3. Instant Toggle (Flip flop visibility)
            $("#btntoggle").click(function() {
                $(".faq-answer").toggle();
            });

            // 4. Smooth Fade Out
            $("#btnfadeout").click(function() {
                $(".faq-answer").fadeOut("slow");
            });

            // 5. Smooth Fade In
            $("#btnfadein").click(function() {
                $(".faq-answer").fadeIn("slow");
            });

            // Individual Click Accordion (Toggles a single answer when clicking its question)
            $(".faq-question").click(function() {
                $(this).next(".faq-answer").slideToggle("fast");
            });
