<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <!-- _______________________________Iframe Exapmle_________________________________ -->

        title="Iframe Example"></iframe><br><br><br><br>

    <!-- _______________________________Form Exapmle_________________________________ -->
    <hr>
    <form action="" style="background-color: lightgreen; padding: 20px; font-family: sans-serif;">

        <h1 style="text-align: center;">Registration Form</h1>
        <table border="1" align="center" width="500" cellpadding="10">

            <tr>
                <td><b>First Name:</b></td>
                <td><input type="text" placeholder="First Name" required></td>
            </tr>

            <tr>
                <td><b>Last Name:</b></td>
                <td><input type="text" placeholder="Last Name" required></td>
            </tr>

            <tr>
                <td><b>Contact No:</b></td>
                <td><input type="number" placeholder="Phone Number" required></td>
            </tr>

            <tr>
                <td><b>Email:</b></td>
                <td><input type="email" placeholder="Email Address" required></td>
            </tr>

            <tr>
                <td><b>Password:</b></td>
                <td><input type="password" placeholder="Password" required></td>
            </tr>

            <tr>
                <td><b>Gender:</b></td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>

            <tr>
                <td><b>City:</b></td>
                <td>
                    <select>
                        <option>Select City</option>
                        <option>Ahmedabad</option>
                        <option>Goa</option>
                        <option>Rajkot</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><b>Address:</b></td>
                <td>
                    <textarea rows="3" cols="30"></textarea>
                </td>
            </tr>

            <tr align="center">
                <td colspan="2">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>
    </form>
</body>

</html>
